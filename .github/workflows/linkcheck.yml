# Check all links in markdown files
name: Linkcheck

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check links
      run: |
        find README.md about documentation installation support tutorials \
          -type f -name '*.md' \
          -exec npx markdown-link-check@3.10.3 --config .markdown_linkcheck_config.json {} \;
